name: Perplexity

on:
  workflow_dispatch:

jobs:
  perplexity:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Restore mistral.mog
        uses: actions/cache/restore@v4
        with:
          path: mistral.mog
          key: mog-${{ hashFiles('export_mistral.py', 'requirements.txt') }}
          restore-keys: |
            mog-

      - name: Require cached model
        run: |
          if [ ! -f mistral.mog ]; then
            echo "::error::mistral.mog not in cache. Run 'Warm model cache' first."
            exit 1
          fi

      - name: Install OpenMP
        run: brew install libomp

      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Q8F16 perplexity check
        run: ./perplexity.sh --check
